<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,600;14..32,700;14..32,800&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="site-theme.css">
    <script src="site-chrome.js" defer></script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Gym Notification System</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<!-- ✅ EXTERNAL CSS -->
<link rel="stylesheet" href="not.css">

    <script src="auth.js"></script>
</head>

<body class="site-page" data-page="home">

<div class="layout">

<!-- LEFT PANEL -->
<div class="panel">

  <div class="header">

    <div class="header-left">
      <a class="back-btn" href="index.html">← Back</a>
      <div class="heading">Notifications</div>
    </div>

    <div class="top-right">

      <div class="bell" onclick="toggleDropdown()">
        <i class="ti ti-bell"></i>
        <div class="badge" id="count">0</div>
      </div>

      <div class="dropdown" id="dropdown"></div>

    </div>

  </div>

  <div class="actions">
    <button class="small-btn" onclick="markAll()">Mark All Read</button>
    <button class="small-btn" onclick="deleteAll()">Delete All</button>
  </div>

  <div class="notif-list" id="list"></div>

</div>

<!-- RIGHT PANEL -->
<div class="panel">
  <h3 style="margin-bottom:15px;">Preferences</h3>
  <div id="prefs"></div>
</div>

</div>

<!-- DEMO SECTION -->
<div style="margin-top:25px;">

  <div style="font-weight:700;margin-bottom:12px;">
    Quick Notification Tests
  </div>

  <div class="demo-grid">

    <button class="demo-card" onclick="demo('reminder')">
      <div class="icon">⏰</div>Reminder
    </button>

    <button class="demo-card" onclick="demo('update')">
      <div class="icon">⚠️</div>Update
    </button>

    <button class="demo-card" onclick="demo('inactivity')">
      <div class="icon">💤</div>Inactivity
    </button>

    <button class="demo-card" onclick="demo('progress')">
      <div class="icon">📈</div>Progress
    </button>

    <button class="demo-card" onclick="demo('promo')">
      <div class="icon">🏷️</div>Promotion
    </button>

  </div>

</div>

<script>

/* =========================
   STATE
========================= */

let notifications = [];

let prefs = {
  reminder:true,
  update:true,
  inactivity:true,
  progress:true,
  promo:true
};

/* =========================
   CHECK ALLOW
========================= */

function allowed(type){
  return prefs[type] === true;
}

/* =========================
   PUSH NOTIFICATION
========================= */

function push(n){

  if(!allowed(n.type)) return;

  notifications.unshift({
    id:Date.now(),
    unread:true,
    ...n
  });

  render();
}

/* =========================
   RENDER NOTIFICATIONS
========================= */

function render(){

  const list=document.getElementById('list');
  list.innerHTML='';

  notifications.forEach(n=>{

    const div=document.createElement('div');
    div.className=`notif ${n.unread?'unread':''}`;

    div.innerHTML=`
      <div style="width:40px;height:40px;background:#eee;border-radius:10px"></div>
      <div>
        <b>${n.title}</b><br>
        <span style="font-size:12px">${n.message}</span>
      </div>
    `;

    div.onclick=()=>n.unread=false;

    list.appendChild(div);

  });

  document.getElementById('count').innerText =
    notifications.filter(n=>n.unread).length;

  renderDropdown();
}

/* =========================
   DROPDOWN
========================= */

function renderDropdown(){
  document.getElementById('dropdown').innerHTML =
    notifications.slice(0,5).map(n=>`
      <div class="item"><b>${n.title}</b><br>${n.message}</div>
    `).join('');
}

function toggleDropdown(){
  const dd=document.getElementById('dropdown');
  dd.style.display = dd.style.display==='block'?'none':'block';
}

/* =========================
   ACTIONS
========================= */

function markAll(){
  notifications.forEach(n=>n.unread=false);
  render();
}

function deleteAll(){
  notifications=[];
  render();
}

/* =========================
   PREFS
========================= */

function renderPrefs(){

  const el=document.getElementById('prefs');

  const rows=[
    {id:'reminder',title:'Reminders',sub:'Class alerts'},
    {id:'update',title:'Updates',sub:'Schedule changes'},
    {id:'inactivity',title:'Inactivity',sub:'Gym reminders'},
    {id:'progress',title:'Progress',sub:'Achievements'},
    {id:'promo',title:'Promotions',sub:'Offers & discounts'}
  ];

  el.innerHTML='';

  rows.forEach(r=>{

    const div=document.createElement('div');
    div.className='pref-row';

    div.innerHTML=`
      <div>
        <div class="pref-title">${r.title}</div>
        <div class="pref-sub">${r.sub}</div>
      </div>

      <label class="switch">
        <input type="checkbox"
        ${prefs[r.id]?'checked':''}
        onchange="prefs['${r.id}']=this.checked">
        <span class="slider"></span>
      </label>
    `;

    el.appendChild(div);

  });

}

/* =========================
   DEMO
========================= */

function demo(type){

  const map={
    reminder:{title:'Class Reminder',message:'Starts in 30 min'},
    update:{title:'Update',message:'Schedule changed'},
    inactivity:{title:'Inactivity',message:'We miss you'},
    progress:{title:'Progress',message:'Streak achieved'},
    promo:{title:'Promotion',message:'50% discount available today!'}
  };

  push({
    type,
    title:map[type].title,
    message:map[type].message
  });

}

/* INIT */
renderPrefs();
render();

</script>

</body>
</html>
