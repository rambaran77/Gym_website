    <!-- Hero Section -->

        </video>
        <div class="hero-overlay"></div>
    
        <div class="hero-content">

    <!-- Main Content -->
    <div class="container">
        <div class="section-header">
            <h2>Our Trainers</h2>
            <p>Certified experts in various fitness disciplines</p>
        </div>

        <div id="trainersGrid" class="trainers-grid">
            <div class="loading">Loading trainers...</div>
        </div>
    </div>

    <!-- Trainer Detail Modal -->
    <div id="trainerModal" class="trainer-detail-modal">
        <div class="trainer-detail-content">
            <button class="close-modal" onclick="closeTrainerModal()">&times;</button>
            <div id="trainerDetailContent"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2025 AuraAthletic. All rights reserved.</p>
    </footer>

    <script>
        // ========================================

        const staticTrainers = [
            {
                id: "static_1",
                name: "Sarah Johnson",
                title: "Senior Yoga Instructor",
                image: "images/yoga.png",
                specialties: ["Yoga", "Meditation", "Pilates", "Mindfulness"],
                bio: "Sarah has been practicing yoga for over 15 years and teaching for 8. She specializes in Vinyasa and Hatha yoga, helping students find balance between mind and body.",
                experience: "8+ years",
                classes: 1240,
                students: 450,
                rating: 4.9,
                schedule: [
                    { day: "Monday", time: "06:00 AM - 07:00 AM", type: "Morning Yoga" },
                    { day: "Wednesday", time: "06:00 AM - 07:00 AM", type: "Morning Yoga" },
                    { day: "Friday", time: "06:00 AM - 07:00 AM", type: "Morning Yoga" }
                ],
                availability: ["Monday", "Wednesday", "Friday"]
            },
            {
                id: "static_2",
                name: "Mike Chen",
                title: "HIIT & Strength Coach",
                image: "images/HIIT.png",
                specialties: ["HIIT", "Strength Training", "CrossFit", "Bootcamp"],
                bio: "Former competitive athlete turned fitness coach. Mike's high-energy classes push you to your limits while ensuring proper form and safety.",
                experience: "10+ years",
                classes: 2100,
                students: 680,
                rating: 4.8,
                schedule: [
                    { day: "Monday", time: "07:00 AM - 08:00 AM", type: "HIIT Blast" },
                    { day: "Wednesday", time: "07:00 AM - 08:00 AM", type: "HIIT Blast" },
                    { day: "Friday", time: "07:00 AM - 08:00 AM", type: "HIIT Blast" }
                ],
                availability: ["Monday", "Wednesday", "Friday"]
            },
            {
                id: "static_3",
                name: "Emma Davis",
                title: "Spin & Cycling Specialist",
                image: "images/luxury-gym.jpg",
                specialties: ["Spin", "Cycling", "Endurance", "Cardio"],
                bio: "Emma brings energy and motivation to every spin class. Her carefully curated playlists and challenging routines make every ride an adventure.",
                experience: "6+ years",
                classes: 890,
                students: 320,
                rating: 4.9,
                schedule: [
                    { day: "Tuesday", time: "09:00 AM - 10:00 AM", type: "Power Spin" },
                    { day: "Thursday", time: "09:00 AM - 10:00 AM", type: "Power Spin" },
                    { day: "Saturday", time: "09:00 AM - 10:00 AM", type: "Power Spin" }
                ],
                availability: ["Tuesday", "Thursday", "Saturday"]
            },
            {
                id: "static_4",
                name: "Alex Rodriguez",
                title: "Strength & Conditioning Expert",
                image: "images/bb.png",
                specialties: ["Strength", "Bodybuilding", "Nutrition", "Powerlifting"],
                bio: "Alex is a certified strength coach who has helped hundreds of clients transform their bodies through personalized training programs.",
                experience: "12+ years",
                classes: 1850,
                students: 520,
                rating: 4.7,
                schedule: [
                    { day: "Monday", time: "05:00 PM - 06:00 PM", type: "Strength Training" },
                    { day: "Wednesday", time: "05:00 PM - 06:00 PM", type: "Strength Training" },
                    { day: "Friday", time: "05:00 PM - 06:00 PM", type: "Strength Training" }
                ],
                availability: ["Monday", "Wednesday", "Friday"]
            },
            {
                id: "static_5",
                name: "Maria Garcia",
                title: "Dance Fitness Instructor",
                image: "images/zumba.png",
                specialties: ["Zumba", "Dance", "Cardio", "Latin Fitness"],
                bio: "Maria's infectious energy and passion for dance make every class a party. She specializes in making fitness fun and accessible for everyone.",
                experience: "7+ years",
                classes: 1560,
                students: 580,
                rating: 4.9,
                schedule: [
                    { day: "Tuesday", time: "06:30 PM - 07:30 PM", type: "Zumba" },
                    { day: "Thursday", time: "06:30 PM - 07:30 PM", type: "Zumba" },
                    { day: "Saturday", time: "10:00 AM - 11:00 AM", type: "Zumba" }
                ],
                availability: ["Tuesday", "Thursday", "Saturday"]
            },
            {
                id: "static_6",
                name: "Lisa Thompson",
                title: "Pilates & Core Specialist",
                image: "images/powerspin.png",
                specialties: ["Pilates", "Core Training", "Flexibility", "Rehabilitation"],
                bio: "Lisa focuses on proper alignment and controlled movements to help you build a strong core and improve overall flexibility.",
                experience: "9+ years",
                classes: 1120,
                students: 390,
                rating: 4.8,
                schedule: [
                    { day: "Monday", time: "08:00 PM - 09:00 PM", type: "Pilates" },
                    { day: "Wednesday", time: "08:00 PM - 09:00 PM", type: "Pilates" },
                    { day: "Friday", time: "08:00 PM - 09:00 PM", type: "Pilates" }
                ],
                availability: ["Monday", "Wednesday", "Friday"]
            }
        ];

        // Global variable to store all trainers (static + dynamic)
        let allTrainers = [];

        // Helper functions
        function toggleMenu() {
            document.getElementById('mobileMenu').classList.toggle('show');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Fetch dynamic trainers from backend
        async function fetchDynamicTrainers() {
            try {
                const response = await fetch('/api/trainers');
                if (!response.ok) throw new Error('Network error');
                const dynamicTrainers = await response.json();
                // Map backend fields to match the static trainer structure
                return dynamicTrainers.map(t => ({
                    id: t._id,
                    name: t.name,
                    title: t.specialty || 'Fitness Trainer',
                    image: t.profileImage || `https://ui-avatars.com/api/?name=${encodeURIComponent(t.name)}&background=d4af37&color=fff&size=200`,
                    specialties: t.specialties || [t.specialty || 'Fitness'],
                    bio: t.bio || 'Passionate about fitness.',
                    experience: t.experience || '0+ years',
                    classes: t.assignedClasses?.length || 0,
                    students: 0, // placeholder
                    rating: 4.8,
                    schedule: [], // optional
                    availability: []
                }));
            } catch (error) {
                console.error('Error fetching dynamic trainers:', error);
                return [];
            }
        }

        // Merge static and dynamic trainers (avoid duplicates by name/email)
        async function loadAllTrainers() {
            const dynamic = await fetchDynamicTrainers();
            // Create a Set of existing trainer names from static trainers
            const staticNames = new Set(staticTrainers.map(t => t.name.toLowerCase()));
            // Add only dynamic trainers whose name is not already in static
            const newDynamic = dynamic.filter(d => !staticNames.has(d.name.toLowerCase()));
            allTrainers = [...staticTrainers, ...newDynamic];
            renderTrainers(allTrainers);
        }

        function renderTrainers(trainers) {
            const grid = document.getElementById('trainersGrid');
            if (!trainers.length) {
                grid.innerHTML = '<div class="loading">No trainers available.</div>';
                return;
            }

            const trainersHTML = trainers.map(trainer => `
                <div class="trainer-card" onclick="showTrainerDetail('${trainer.id}')">
                    <div class="trainer-image">
                        <img src="${trainer.image}" alt="${trainer.name}" onerror="this.src='images/modern-gym.jpg'">
                        <span class="trainer-badge">${trainer.experience}</span>
                    </div>
                    <div class="trainer-info">
                        <h3 class="trainer-name">${escapeHtml(trainer.name)}</h3>
                        <div class="trainer-title">${escapeHtml(trainer.title)}</div>
                        <div class="rating">
                            ${'★'.repeat(Math.floor(trainer.rating))}${trainer.rating % 1 ? '½' : ''}
                            <span style="color: var(--gray);">(${trainer.rating})</span>
                        </div>
                        <div class="trainer-specialty">
                            ${trainer.specialties.map(s => `<span class="specialty-tag">${escapeHtml(s)}</span>`).join('')}
                        </div>
                        <p class="trainer-bio">${escapeHtml(trainer.bio.substring(0, 100))}...</p>
                        <div class="trainer-stats">
                            <div class="stat">
                                <span class="stat-value">${trainer.classes}</span>
                                <span class="stat-label">Classes</span>
                            </div>
                            <div class="stat">
                                <span class="stat-value">${trainer.students}</span>
                                <span class="stat-label">Students</span>
                            </div>
                        </div>
                        <button class="btn-book-trainer" onclick="event.stopPropagation(); showBookingForm('${trainer.id}')">
                            Book Personal Session
                        </button>
                    </div>
                </div>
            `).join('');
            grid.innerHTML = trainersHTML;
        }

        function showTrainerDetail(trainerId) {
            const trainer = allTrainers.find(t => t.id == trainerId);
            if (!trainer) return;

            const modal = document.getElementById('trainerModal');
            const content = document.getElementById('trainerDetailContent');

            content.innerHTML = `
                <div style="padding: 2rem;">
                    <div style="display: flex; gap: 2rem; flex-wrap: wrap;">
                        <img src="${trainer.image}" alt="${trainer.name}" style="width: 200px; height: 200px; object-fit: cover; border-radius: var(--radius);">
                        <div style="flex: 1;">
                            <h2 style="color: var(--secondary);">${escapeHtml(trainer.name)}</h2>
                            <p style="color: var(--primary); font-weight: 600;">${escapeHtml(trainer.title)}</p>
                            <div class="rating">${'★'.repeat(Math.floor(trainer.rating))} (${trainer.rating})</div>
                            <p><strong>Experience:</strong> ${escapeHtml(trainer.experience)}</p>
                            <p><strong>Total Classes:</strong> ${trainer.classes}</p>
                            <p><strong>Happy Students:</strong> ${trainer.students}</p>
                        </div>
                    </div>
                    
                    <div style="margin-top: 2rem;">
                        <h3>About ${trainer.name.split(' ')[0]}</h3>
                        <p style="color: var(--gray);">${escapeHtml(trainer.bio)}</p>
                    </div>
                    
                    <div style="margin-top: 2rem;">
                        <h3>Specialties</h3>
                        <div class="trainer-specialty">
                            ${trainer.specialties.map(s => `<span class="specialty-tag">${escapeHtml(s)}</span>`).join('')}
                        </div>
                    </div>
                    
                    <div style="margin-top: 2rem;">
                        <h3>Weekly Schedule</h3>
                        <div class="schedule-grid">
                            ${trainer.schedule && trainer.schedule.length ? trainer.schedule.map(s => `
                                <div class="schedule-item">
                                    <strong>${s.day}</strong>
                                    <span>${s.time}</span>
                                    <span class="time-slot">${s.type}</span>
                                </div>
                            `).join('') : '<p>No schedule available</p>'}
                        </div>
                    </div>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function showBookingForm(trainerId) {
            const trainer = allTrainers.find(t => t.id == trainerId);
            if (!trainer) return;

            const modal = document.getElementById('trainerModal');
            const content = document.getElementById('trainerDetailContent');

            content.innerHTML = `
                <div style="padding: 2rem;">
                    <h2 style="color: var(--secondary); margin-bottom: 1rem;">Book Personal Training with ${escapeHtml(trainer.name)}</h2>
                    <form id="bookingForm" onsubmit="submitBooking(event, '${trainer.id}')">
                        <div class="form-group">
                            <label>Your Name *</label>
                            <input type="text" id="clientName" required placeholder="Enter your full name">
                        </div>
                        <div class="form-group">
                            <label>Your Email *</label>
                            <input type="email" id="clientEmail" required placeholder="Enter your email">
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" id="clientPhone" placeholder="Enter your phone number">
                        </div>
                        <div class="form-group">
                            <label>Select Session Type *</label>
                            <select id="sessionType" required>
                                <option value="">Choose session type</option>
                                <option value="1-hour">1-Hour Personal Training - $75</option>
                                <option value="30-min">30-Min Quick Session - $40</option>
                                <option value="90-min">90-Min Intensive - $110</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Preferred Day *</label>
                            <select id="preferredDay" required>
                                <option value="">Select day</option>
                                ${trainer.availability.map(day => `<option value="${day}">${day}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Preferred Time</label>
                            <input type="time" id="preferredTime">
                        </div>
                        <div class="form-group">
                            <label>Special Requests</label>
                            <textarea id="specialRequests" rows="3" placeholder="Any specific goals or concerns?"></textarea>
                        </div>
                        <div style="display: flex; gap: 1rem;">
                            <button type="submit" class="btn-book-trainer" style="flex: 1;">Request Booking</button>
                            <button type="button" class="btn-book-trainer" onclick="showTrainerDetail('${trainer.id}')" style="background: var(--gray);">Back</button>
                        </div>
                    </form>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function submitBooking(event, trainerId) {
            event.preventDefault();
            const trainer = allTrainers.find(t => t.id == trainerId);
            const name = document.getElementById('clientName').value;
            const email = document.getElementById('clientEmail').value;
            alert(`✓ Booking request sent to ${trainer.name}!\n\nWe'll contact you at ${email} within 24 hours to confirm your session.`);
            closeTrainerModal();
        }

        function closeTrainerModal() {
            document.getElementById('trainerModal').style.display = 'none';
        }

        window.onclick = function (event) {
            const modal = document.getElementById('trainerModal');
            if (event.target === modal) closeTrainerModal();
        }

        // Initialize page: load static + dynamic trainers
        loadAllTrainers();
    </script>
</body>

</html>
