<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Subscription Plans</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0b10;
      --panel: rgba(20, 22, 28, 0.95);
      --panel-soft: rgba(255, 255, 255, 0.05);
      --ink: #ffffff;
      --muted: #b7b0a1;
      --accent: #d4af37;
      --accent-soft: rgba(212, 175, 55, 0.15);
      --line: rgba(212, 175, 55, 0.18);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0a0b10 0%, #14161c 100%);
      color: var(--ink);
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .plans-wrap {
      max-width: 860px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid rgba(212, 175, 55, 0.12);
      border-radius: 28px;
      padding: 2rem;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }
    .section-label {
      font-size: 13px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }
    .section-title {
      font-size: 32px;
      font-weight: 600;
      color: #fff;
      margin: 0 0 0.25rem;
    }
    .section-sub {
      font-size: 15px;
      color: var(--muted);
      margin: 0 0 2rem;
    }
    .tab-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 9px 20px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      font-size: 14px;
      cursor: pointer;
      color: #fff;
      transition: all 0.15s ease;
    }
    .tab-btn.active {
      background: rgba(212, 175, 55, 0.2);
      color: #fff;
      border-color: rgba(212, 175, 55, 0.35);
    }
    .plans-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }
    .plan-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(212, 175, 55, 0.1);
      border-radius: 18px;
      padding: 1.4rem;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      color: #fff;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .plan-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 55px rgba(212, 175, 55, 0.18);
    }
    .plan-card.featured {
      border-color: rgba(212, 175, 55, 0.35);
    }
    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 999px;
      background: rgba(212, 175, 55, 0.15);
      color: #d4af37;
      margin-bottom: 10px;
    }
    .plan-name {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin: 0 0 6px;
    }
    .plan-desc {
      font-size: 14px;
      color: var(--muted);
      margin: 0 0 1rem;
    }
    .plan-price {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      margin: 0;
    }
    .plan-price span {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.75);
    }
    .divider {
      border: none;
      border-top: 1px solid rgba(212, 175, 55, 0.1);
      margin: 1rem 0;
    }
    .feature-list {
      list-style: none;
      margin: 0 0 1.25rem;
    }
    .feature-list li {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
      padding: 6px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .feature-list li::before {
      content: "";
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .feature-list li.no {
      opacity: 0.55;
    }
    .cta-btn {
      width: 100%;
      padding: 12px 0;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.08);
      font-size: 14px;
      cursor: pointer;
      color: #fff;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .cta-btn.primary {
      background: linear-gradient(135deg, #d4af37, #b8960c);
      color: #0a0b10;
      border-color: transparent;
    }
    .cta-btn:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }
    .savings-note {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="plans-wrap">
    <p class="section-label">Membership</p>
    <h1 class="section-title">Choose your plan</h1>
    <p class="section-sub">Flexible options to fit your schedule and goals.</p>

    <div class="tab-row">
      <button class="tab-btn active" onclick="setTab('day', this)">Day pass</button>
      <button class="tab-btn" onclick="setTab('week', this)">Weekly</button>
      <button class="tab-btn" onclick="setTab('month', this)">Monthly</button>
    </div>

    <div id="plans-container"></div>
  </div>

  <script>
    const plans = {
      day: [
        {
          id: "single-day",
          name: "Single day",
          desc: "One-time gym access",
          price: "£8",
          per: "/ day",
          features: [
            { text: "Full gym access", yes: true },
            { text: "Locker & shower", yes: true },
            { text: "Group classes", yes: false },
            { text: "Personal trainer", yes: false }
          ],
          cta: "Buy day pass",
          featured: false,
          link: "day-pass.html"
        },
        {
          id: "day-class",
          name: "Day + class",
          desc: "Gym plus one group class",
          price: "£12",
          per: "/ day",
          features: [
            { text: "Full gym access", yes: true },
            { text: "Locker & shower", yes: true },
            { text: "1 group class", yes: true },
            { text: "Personal trainer", yes: false }
          ],
          cta: "Buy day pass",
          featured: true,
          badge: "Most popular",
          link: "day-pass.html"
        }
      ],
      week: [
        {
          id: "basic-weekly",
          name: "Basic weekly",
          desc: "7 days of gym access",
          price: "£30",
          per: "/ week",
          features: [
            { text: "Full gym access", yes: true },
            { text: "Locker & shower", yes: true },
            { text: "Group classes", yes: false },
            { text: "Personal trainer", yes: false }
          ],
          cta: "Start weekly plan",
          featured: false,
          savings: "Save vs daily",
          link: "weekly-plan.html"
        },
        {
          id: "standard-weekly",
          name: "Standard weekly",
          desc: "Gym + unlimited classes",
          price: "£45",
          per: "/ week",
          features: [
            { text: "Full gym access", yes: true },
            { text: "Locker & shower", yes: true },
            { text: "Unlimited classes", yes: true },
            { text: "Personal trainer", yes: false }
          ],
          cta: "Start weekly plan",
          featured: true,
          badge: "Best value",
          savings: "Save vs daily",
          link: "weekly-plan.html"
        },
        {
          id: "premium-weekly",
          name: "Premium weekly",
          desc: "All-inclusive experience",
          price: "£65",
          per: "/ week",
          features: [
            { text: "Full gym access", yes: true },
            { text: "Locker & shower", yes: true },
            { text: "Unlimited classes", yes: true },
            { text: "1 PT session included", yes: true }
          ],
          cta: "Start weekly plan",
          featured: false,
          link: "weekly-plan.html"
        }
      ],
      month: [
        {
          id: "basic-monthly",
          name: "Basic",
          desc: "Just the essentials",
          price: "£25",
          per: "/ month",
          features: [
            { text: "Full gym access", yes: true },
            { text: "Locker & shower", yes: true },
            { text: "Group classes", yes: false },
            { text: "Personal trainer", yes: false }
          ],
          cta: "Get started",
          featured: false,
          savings: "Save 69% vs daily",
          link: "monthly-plan.html"
        },
        {
          id: "standard-monthly",
          name: "Standard",
          desc: "Most members choose this",
          price: "£45",
          per: "/ month",
          features: [
            { text: "Full gym access", yes: true },
            { text: "Locker & shower", yes: true },
            { text: "Unlimited classes", yes: true },
            { text: "Personal trainer", yes: false }
          ],
          cta: "Get started",
          featured: true,
          badge: "Most popular",
          savings: "Save 69% vs daily",
          link: "monthly-plan.html"
        },
        {
          id: "premium-monthly",
          name: "Premium",
          desc: "The full experience",
          price: "£75",
          per: "/ month",
          features: [
            { text: "Full gym access", yes: true },
            { text: "Locker & shower", yes: true },
            { text: "Unlimited classes", yes: true },
            { text: "4 PT sessions / month", yes: true }
          ],
          cta: "Get started",
          featured: false,
          savings: "Save 69% vs daily",
          link: "monthly-plan.html"
        }
      ]
    };

    function setTab(tab, btn) {
      document.querySelectorAll(".tab-btn").forEach((button) => button.classList.remove("active"));
      btn.classList.add("active");
      render(tab);
    }

    function render(tab) {
      const container = document.getElementById("plans-container");
      const items = plans[tab];
      container.innerHTML = `<div class="plans-grid">${items.map((plan) => `
        <div class="plan-card ${plan.featured ? "featured" : ""}">
          ${plan.badge ? `<div class="badge">${plan.badge}</div>` : ""}
          <p class="plan-name">${plan.name}</p>
          <p class="plan-desc">${plan.desc}</p>
          <p class="plan-price">${plan.price}<span>${plan.per}</span></p>
          <hr class="divider">
          <ul class="feature-list">
            ${plan.features.map((feature) => `<li class="${feature.yes ? "yes" : "no"}">${feature.text}</li>`).join("")}
          </ul>
          <button class="cta-btn ${plan.featured ? "primary" : ""}" ${plan.link ? `onclick="goToPlan('${plan.link}', '${plan.id}')"` : ""}>${plan.cta}</button>
          ${plan.savings ? `<p class="savings-note">${plan.savings}</p>` : ""}
        </div>`).join("")}
      </div>`;
    }

    function goToPlan(link, planId) {
      window.location.href = `${link}?plan=${encodeURIComponent(planId)}`;
    }

    render("day");
  </script>
</body>
</html>
